<!DOCTYPE html><html><head><style>
  body { background: #ECECEC; padding: 100px; }
  .logoVector { position: relative; width: 289.5px; height: 286.95px; }
  .v11 { position: absolute; right: 0; bottom: 0; width: 215px; height: 268px; }
  .v10 { position: absolute; left: 0; bottom: 30px; width: 166px; height: 98px; }
  .white-border {
    position: absolute; left: 0; top: 0; width: 100%; height: 100%;
    filter: drop-shadow(-5px 5px 10px rgba(212, 212, 212, 0.2)) drop-shadow(5px -5px 10px rgba(212, 212, 212, 0.2)) drop-shadow(-5px -5px 10px rgba(255, 255, 255, 0.9)) drop-shadow(5px 5px 13px rgba(212, 212, 212, 0.9));
  }
  .white-border svg path {
    fill: #ECECEC !important;
    stroke: #ECECEC;
    stroke-width: 25px;
    stroke-linejoin: round;
  }
</style></head><body>
  <div class="logoVector">
    <div class="white-border">
      <img src="Vector 11.svg" class="v11" style="filter: brightness(10) contrast(0)"/>
      <img src="Vector 10.svg" class="v10" style="filter: brightness(10) contrast(0)"/>
    </div>
    <div class="blue-inner">
      <img src="Vector 11.svg" class="v11"/>
      <img src="Vector 10.svg" class="v10"/>
    </div>
  </div>
</body></html>
